<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 410" width="680" height="410">
  <defs>
    <mask id="text-gaps" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="680" height="410" fill="white"/>
      <rect x="314.93" y="10.93" width="50.59" height="15.66" fill="black" rx="2"/>
      <rect x="10" y="59.64" width="14.62" height="16.95" fill="black" rx="2"/>
      <rect x="10" y="71.64" width="14.62" height="16.95" fill="black" rx="2"/>
      <rect x="10" y="83.64" width="14.62" height="16.95" fill="black" rx="2"/>
      <rect x="14" y="12.64" width="127.11" height="16.95" fill="black" rx="2"/>
      <rect x="158.77" y="14.23" width="40.46" height="14.36" fill="black" rx="2"/>
      <rect x="14" y="40.93" width="44.13" height="15.66" fill="black" rx="2"/>
      <rect x="60" y="40.93" width="50.14" height="15.66" fill="black" rx="2"/>
      <rect x="14" y="53.64" width="146.96" height="16.95" fill="black" rx="2"/>
      <rect x="14" y="67.64" width="193.27" height="16.95" fill="black" rx="2"/>
      <rect x="189.38" y="47.64" width="21.24" height="16.95" fill="black" rx="2"/>
      <rect x="30" y="9.64" width="34.47" height="16.95" fill="black" rx="2"/>
      <rect x="30" y="24.93" width="146.45" height="15.66" fill="black" rx="2"/>
      <rect x="30" y="44.64" width="107.25" height="16.95" fill="black" rx="2"/>
      <rect x="168.77" y="9.23" width="40.46" height="14.36" fill="black" rx="2"/>
      <rect x="135.08" y="201.34" width="130.69" height="18.25" fill="black" rx="2"/>
      <rect x="138.81" y="218.93" width="122.37" height="15.66" fill="black" rx="2"/>
    </mask>

    <!-- Gradient for the AI pulse -->
    <radialGradient id="aiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Gradient for the checkmark circle -->
    <radialGradient id="checkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Animated dash for the connector lines -->
    <style>
      /* Fade-in for the whole card */
      .card-file { animation: fadeSlideUp 0.6s ease both; }
      .card-commit { animation: fadeSlideUp 0.6s 0.3s ease both; }
      .card-git { animation: fadeSlideUp 0.6s 0.6s ease both; }
      .card-center { animation: fadeSlideUp 0.6s 0.15s ease both; }

      @keyframes fadeSlideUp {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      /* Blinking cursor in the commit message */
      .cursor { animation: blink 1.1s step-start infinite; }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Pulse ring around the AI circle */
      .ai-ring {
        transform-origin: 570px 131px;
        animation: pulseRing 2s ease-out infinite;
      }
      @keyframes pulseRing {
        0%   { r: 12; opacity: 0.8; }
        100% { r: 26; opacity: 0; }
      }

      /* Pulse ring around the checkmark circle */
      .check-ring {
        transform-origin: 288px 168px;
        animation: pulseRing2 2s 0.4s ease-out infinite;
      }
      @keyframes pulseRing2 {
        0%   { r: 16; opacity: 0.7; }
        100% { r: 30; opacity: 0; }
      }

      /* Travelling dot along the top dashed connector */
      .dot-top {
        animation: travelTop 2.2s 0.8s ease-in-out infinite;
      }
      @keyframes travelTop {
        0%   { transform: translate(200px, 195px); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translate(370px, 120px); opacity: 0; }
      }

      /* Travelling dot along the bottom dashed connector */
      .dot-bottom {
        animation: travelBottom 2.2s 1.4s ease-in-out infinite;
      }
      @keyframes travelBottom {
        0%   { transform: translate(200px, 195px); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translate(370px, 225px); opacity: 0; }
      }

      /* Shimmer on the "generate msg" button */
      .btn-generate {
        animation: btnGlow 2.5s ease-in-out infinite;
      }
      @keyframes btnGlow {
        0%, 100% { opacity: 0.15; }
        50%       { opacity: 0.35; }
      }

      /* Subtle float on the whole SVG content */
      .scene {
        animation: float 4s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-4px); }
      }

      /* Dash march on the two connector lines */
      .dash-line {
        stroke-dasharray: 4 3;
        animation: dashMarch 1.2s linear infinite;
      }
      @keyframes dashMarch {
        to { stroke-dashoffset: -14; }
      }

      /* Git graph line draw */
      .git-line {
        stroke-dasharray: 60;
        stroke-dashoffset: 60;
        animation: drawLine 1s 0.8s ease forwards;
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }

      /* AI badge subtle spin shimmer */
      .ai-badge {
        transform-origin: 570px 131px;
        animation: badgePop 0.5s 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      }
      @keyframes badgePop {
        from { transform: scale(0); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
      }

      /* +/- diff lines: stagger fade in */
      .diff-plus1 { animation: fadeSlideUp 0.4s 0.9s ease both; opacity: 0; }
      .diff-plus2 { animation: fadeSlideUp 0.4s 1.05s ease both; opacity: 0; }
      .diff-minus { animation: fadeSlideUp 0.4s 1.2s ease both; opacity: 0; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="410" rx="16" fill="#1e1e2e"/>

  <g class="scene">

    <!-- Inner card bg -->
    <rect x="40" y="30" width="600" height="340" rx="12" fill="#181825" opacity="0.6"/>

    <!-- Preview label -->
    <text x="340" y="22" text-anchor="middle" opacity="0.5"
          font-family="'SF Mono', monospace" font-size="10" fill="#64748b">preview</text>

    <!-- ═══════════════════════════════════════════ -->
    <!--  FILE CARD  (left, translate 200,60)        -->
    <!-- ═══════════════════════════════════════════ -->
    <g class="card-file" transform="translate(200, 60)">
      <!-- file body -->
      <rect x="0" y="0" width="110" height="130" rx="8"
            fill="#2e2e48" stroke="#4a4a6a" stroke-width="0.8"/>
      <!-- dog-ear -->
      <polygon points="80,0 110,30 80,30"
               fill="#3a3a58" stroke="#4a4a6a" stroke-width="0.8"/>
      <line x1="80" y1="0" x2="80" y2="30"
            stroke="#4a4a6a" stroke-width="0.8" mask="url(#text-gaps)"/>

      <!-- code lines -->
      <line x1="14" y1="42" x2="90" y2="42"
            stroke="#5a6a8a" stroke-width="2.5" stroke-linecap="round"
            mask="url(#text-gaps)"/>
      <line x1="14" y1="54" x2="80" y2="54"
            stroke="#5a6a8a" stroke-width="2.5" stroke-linecap="round"
            mask="url(#text-gaps)"/>

      <!-- diff +++ -->
      <g class="diff-plus1">
        <text x="14" y="72" font-family="'SF Mono',monospace" font-size="11"
              font-weight="700" fill="#4ade80">+</text>
        <line x1="24" y1="70" x2="88" y2="70"
              stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"
              mask="url(#text-gaps)"/>
      </g>

      <g class="diff-plus2">
        <text x="14" y="84" font-family="'SF Mono',monospace" font-size="11"
              font-weight="700" fill="#4ade80">+</text>
        <line x1="24" y1="82" x2="72" y2="82"
              stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"
              mask="url(#text-gaps)"/>
      </g>

      <g class="diff-minus">
        <text x="14" y="96" font-family="'SF Mono',monospace" font-size="11"
              font-weight="700" fill="#f87171">-</text>
        <line x1="24" y1="94" x2="80" y2="94"
              stroke="#f87171" stroke-width="2.5" stroke-linecap="round"
              mask="url(#text-gaps)"/>
      </g>

      <line x1="14" y1="108" x2="60" y2="108"
            stroke="#5a6a8a" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Checkmark circle -->
      <circle cx="88" cy="108" r="17" fill="#7c3aed" opacity="0.15" class="check-ring"/>
      <circle cx="88" cy="108" r="14"
              fill="#7c3aed" stroke="#25253a" stroke-width="3"/>
      <polyline points="82,108 87,114 95,101"
                fill="none" stroke="white" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- ═══════════════════════════════════════════ -->
    <!--  COMMIT CARD  (right-top, translate 370,75) -->
    <!-- ═══════════════════════════════════════════ -->
    <g class="card-commit" transform="translate(370, 75)">
      <rect x="0" y="0" width="220" height="100" rx="8"
            fill="#1e1e32" stroke="#2d2d4a" stroke-width="0.8"/>

      <!-- title bar -->
      <rect x="10" y="10" width="200" height="22" rx="4" fill="#252540"/>
      <text x="18" y="25" opacity="0.7"
            font-family="'SF Mono',monospace" font-size="11" fill="#a0aec0">ollama-auto-commit</text>
      <rect x="155" y="13" width="48" height="16" rx="3" fill="#1a3a2a"/>
      <text x="179" y="24" text-anchor="middle"
            font-family="'SF Mono',monospace" font-size="9" fill="#4ade80">staged</text>

      <!-- commit line -->
      <text x="18" y="52" font-family="'SF Mono',monospace" font-size="10" fill="#818cf8">commit </text>
      <text x="64" y="52" font-family="'SF Mono',monospace" font-size="10" fill="#c084fc">a3f9d12</text>

      <!-- generated message -->
      <text x="18" y="66" opacity="0.9"
            font-family="'SF Mono',monospace" font-size="11" fill="#a0aec0">feat: add auto commit</text>
      <text x="18" y="80" opacity="0.5"
            font-family="'SF Mono',monospace" font-size="11" fill="#a0aec0">generated by ollama · llama3</text>

      <!-- AI badge -->
      <circle cx="200" cy="56" r="18" fill="url(#aiGlow)" class="ai-ring"/>
      <g class="ai-badge">
        <circle cx="200" cy="56" r="10" fill="#7c3aed" opacity="0.9"/>
        <text x="200" y="60" text-anchor="middle"
              font-family="monospace" font-size="11" font-weight="700" fill="white">AI</text>
      </g>
    </g>

    <!-- ═══════════════════════════════════════════ -->
    <!--  GIT GRAPH  (right-bottom, translate 370,195) -->
    <!-- ═══════════════════════════════════════════ -->
    <g class="card-git" transform="translate(370, 195)">
      <rect x="0" y="0" width="220" height="70" rx="8"
            fill="#1e1e32" stroke="#2d2d4a" stroke-width="0.8"/>

      <!-- commit dot chain -->
      <circle cx="20" cy="18" r="5" fill="#818cf8"/>
      <line x1="20" y1="23" x2="20" y2="52"
            stroke="#818cf8" stroke-width="2" stroke-linecap="round" class="git-line"/>
      <circle cx="20" cy="52" r="5" fill="#818cf8" opacity="0.5"/>
      <path d="M20 35 Q40 35 40 52"
            fill="none" stroke="#818cf8" stroke-width="2"
            stroke-dasharray="3,2" stroke-linecap="round" class="git-line"/>
      <circle cx="40" cy="52" r="4" fill="#4ade80" opacity="0.7"/>

      <!-- labels -->
      <text x="34" y="22" font-family="'SF Mono',monospace" font-size="11" fill="#a0b4c0">main</text>
      <text x="34" y="36" font-family="'SF Mono',monospace" font-size="10" fill="#64748b">HEAD → feat/auto-commit</text>
      <text x="34" y="57" opacity="0.6"
            font-family="'SF Mono',monospace" font-size="11" fill="#a0b4c0">3 files changed</text>

      <!-- +24 -6 badge -->
      <rect x="168" y="8" width="42" height="16" rx="3" fill="#1e3a5f"/>
      <text x="189" y="19" text-anchor="middle"
            font-family="'SF Mono',monospace" font-size="9" fill="#a5b4fc">+24 -6</text>
    </g>

    <!-- ═══════════════════════════════════════════ -->
    <!--  CENTER LABEL + BUTTONS                     -->
    <!-- ═══════════════════════════════════════════ -->
    <g class="card-center">
      <text x="200" y="215" text-anchor="middle"
            font-family="'SF Pro',sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">ollama auto commit</text>
      <text x="200" y="230" text-anchor="middle"
            font-family="'SF Mono',monospace" font-size="10" fill="#64748b">v0.0.1 · vscode ext</text>

      <!-- generate msg button -->
      <g transform="translate(155, 240)">
        <rect x="0" y="0" width="90" height="24" rx="4"
              fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="0.8"
              class="btn-generate"/>
        <text x="45" y="15" text-anchor="middle"
              font-family="'SF Mono',monospace" font-size="11" fill="#a78bfa">generate msg</text>
      </g>

      <!-- git commit button -->
      <g transform="translate(155, 272)">
        <rect x="0" y="0" width="90" height="24" rx="4"
              fill="#252540" stroke="#3a3a5a" stroke-width="0.8"/>
        <text x="45" y="15" text-anchor="middle"
              font-family="'SF Mono',monospace" font-size="11" fill="#64748b">git commit</text>
      </g>
    </g>

    <!-- ═══════════════════════════════════════════ -->
    <!--  CONNECTOR LINES with marching dashes       -->
    <!-- ═══════════════════════════════════════════ -->
    <line x1="200" y1="195" x2="370" y2="120"
          stroke="#3a3a5a" stroke-width="0.8"
          class="dash-line"/>
    <line x1="200" y1="195" x2="370" y2="225"
          stroke="#3a3a5a" stroke-width="0.8"
          class="dash-line" mask="url(#text-gaps)"/>

    <!-- Travelling dots along connectors -->
    <circle r="3" fill="#a78bfa" class="dot-top" cx="200" cy="195" opacity="0"/>
    <circle r="3" fill="#a78bfa" class="dot-bottom" cx="200" cy="195" opacity="0"/>

  </g><!-- /scene float -->
</svg>
